name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  publish:

    runs-on: ubuntu-latest

    env:
      JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
      JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
      JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
      JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
      JRELEASER_MAVENCENTRAL_TOKEN: ${{ secrets.JRELEASER_MAVENCENTRAL_TOKEN }}
      JRELEASER_BLUESKY_HANDLE: ${{ secrets.JRELEASER_BLUESKY_HANDLE }}
      JRELEASER_BLUESKY_PASSWORD: ${{ secrets.JRELEASER_BLUESKY_PASSWORD }}
      JRELEASER_MASTODON_HOST: ${{ secrets.JRELEASER_MASTODON_HOST }}
      JRELEASER_MASTODON_ACCESS_TOKEN: ${{ secrets.JRELEASER_MASTODON_ACCESS_TOKEN }}

    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f

      - run: ./gradlew jreleaserConfig -Pversion=${{ github.event.inputs.version }} --git-root-search
      - run: ./gradlew publish -Pversion=${{ github.event.inputs.version }}
      - run: ./gradlew :plugins:approvej-gradle-plugin:publishPlugins -Pversion=${{ github.event.inputs.version }}
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
      - name: Extract release notes for version
        run: awk '/^## v${{ github.event.inputs.version }}$/{found=1; next} /^## v/{if(found) exit} found' CHANGELOG.md > RELEASE_NOTES.md
      - run: ./gradlew jreleaserFullRelease -Pversion=${{ github.event.inputs.version }} --git-root-search --stacktrace
      - uses: actions/upload-artifact@v7
        with:
          path: build/jreleaser/trace.log
        if: always()

  update-pages:
    needs: publish
    uses: ./.github/workflows/update-pages.yml
    with:
      version: ${{ github.event.inputs.version }}
