version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # JUnit 5 and JUnit 4 are pinned for IntelliJ platform test compatibility.
      # IntelliJ's test framework extends junit.framework.TestCase (JUnit 4)
      # and uses JUnit 3 method naming conventions requiring the vintage engine.
      - dependency-name: org.junit.jupiter:*
        update-types:
        - version-update:semver-major
      - dependency-name: org.junit.platform:*
        update-types:
        - version-update:semver-major
      - dependency-name: org.junit.vintage:*
        update-types:
        - version-update:semver-major
      - dependency-name: junit:junit
        update-types:
        - version-update:semver-major
      # JGit is pinned to 6.x on the buildscript classpath because JReleaser still requires
      # org.eclipse.jgit.lib.GpgObjectSigner, which JGit removed in 7.0. Ignore 7.x until
      # JReleaser upgrades: https://github.com/jreleaser/jreleaser/issues/1846
      - dependency-name: org.eclipse.jgit:*
        update-types:
        - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
