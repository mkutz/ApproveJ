version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # JUnit 5 and JUnit 4 are pinned for IntelliJ platform test compatibility.
      # IntelliJ's test framework extends junit.framework.TestCase (JUnit 4)
      # and uses JUnit 3 method naming conventions requiring the vintage engine.
      - dependency-name: org.junit.jupiter:*
        update-types:
        - version-update:semver-major
      - dependency-name: org.junit.platform:*
        update-types:
        - version-update:semver-major
      - dependency-name: org.junit.vintage:*
        update-types:
        - version-update:semver-major
      - dependency-name: junit:junit
        update-types:
        - version-update:semver-major
      # JReleaser 1.24.0 breaks the publish workflow with
      # NoClassDefFoundError: org/eclipse/jgit/lib/GpgObjectSigner (JGit incompatibility).
      # Pinned to 1.23.x until the upstream 1.24 line is fixed.
      - dependency-name: org.jreleaser:*
        versions:
        - 1.24.x
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
