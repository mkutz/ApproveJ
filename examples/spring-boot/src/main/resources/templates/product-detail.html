<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${product.name} + ' — Shop'">Product — Shop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      line-height: 1.5;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #d2d2d7;
      padding: 16px 40px;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    header .logo {
      font-size: 20px;
      font-weight: 700;
      color: #0071e3;
      text-decoration: none;
    }

    header nav a {
      color: #6e6e73;
      text-decoration: none;
      font-size: 14px;
    }

    .breadcrumb {
      max-width: 960px;
      margin: 24px auto 0;
      padding: 0 40px;
      font-size: 13px;
      color: #6e6e73;
    }

    .breadcrumb a { color: #0071e3; text-decoration: none; }

    .product-detail {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }

    .product-image {
      background: #fff;
      border-radius: 16px;
      padding: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1;
      border: 1px solid #d2d2d7;
    }

    .product-image .placeholder {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 48px;
    }

    .product-info { padding-top: 16px; }

    .product-info .sku {
      font-size: 13px;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .product-info h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .product-info .description {
      font-size: 16px;
      color: #6e6e73;
      margin-bottom: 24px;
    }

    .product-info .price {
      font-size: 28px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 32px;
    }

    .product-info .price .currency {
      font-size: 18px;
      vertical-align: super;
    }

    .add-to-cart {
      background: #e30000;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-bottom: 16px;
    }

    .product-meta {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #d2d2d7;
    }

    .product-meta dt {
      font-size: 13px;
      color: #6e6e73;
      margin-bottom: 2px;
    }

    .product-meta dd {
      font-size: 15px;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      font-size: 13px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">Shop</a>
    <nav>
      <a href="/">Products</a>
    </nav>
  </header>

  <div class="breadcrumb">
    <a href="/">Products</a> / <span th:text="${product.name}">Product Name</span>
  </div>

  <div class="product-detail">
    <div class="product-image">
      <div class="placeholder" th:text="${#strings.substring(product.name, 0, 1)}">E</div>
    </div>
    <div class="product-info">
      <div class="sku" th:text="'SKU: ' + ${product.sku}">SKU: ESP-001</div>
      <h1 th:text="${product.name}">Espresso Machine</h1>
      <p class="description" th:text="${product.description}">Professional espresso machine</p>
      <div class="price">
        <span class="currency">USD</span><span th:text="${#numbers.formatDecimal(product.price, 1, 'NONE', 2, 'POINT')}">299.99</span>
      </div>
      <button class="add-to-cart">Add to Cart</button>
      <span class="badge">In Stock</span>
      <dl class="product-meta">
        <dt>Category</dt>
        <dd>Coffee Equipment</dd>
        <dt>Warranty</dt>
        <dd>2 Years</dd>
      </dl>
    </div>
  </div>
</body>
</html>
